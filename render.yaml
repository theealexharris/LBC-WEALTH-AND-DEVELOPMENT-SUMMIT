services:
  - type: web
    name: LBC-WEALTH-AND-DEVELOPMENT-SUMMIT
    runtime: node
    region: oregon
    plan: free
    buildCommand: npx pnpm@10 install --frozen-lockfile && npx pnpm@10 --filter @workspace/lbc-summit run build && npx pnpm@10 --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/healthz
