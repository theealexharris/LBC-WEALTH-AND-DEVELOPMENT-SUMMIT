services:
  - type: web
    name: LBC-WEALTH-AND-DEVELOPMENT-SUMMIT
    runtime: node
    region: oregon
    plan: free
    buildCommand: npx pnpm@10 install --frozen-lockfile && npx pnpm@10 --filter @workspace/lbc-summit run build && npx pnpm@10 --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SITE_URL
        sync: false
    healthCheckPath: /api/healthz
