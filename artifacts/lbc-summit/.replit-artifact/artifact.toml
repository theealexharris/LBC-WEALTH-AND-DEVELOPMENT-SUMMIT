kind = "web"
previewPath = "/"
title = "LBC Wealth & Development Summit"
version = "1.0.0"
id = "artifacts/lbc-summit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19324

[services.development]
run = "pnpm --filter @workspace/lbc-summit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lbc-summit", "run", "build" ]
publicDir = "artifacts/lbc-summit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19324"
BASE_PATH = "/"
